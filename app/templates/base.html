<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bulk Calendar{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vrc: {
                            bg:          '#000000',
                            surface:     '#0a0a0a',
                            'surface-2': '#111111',
                            border:      '#1a1a1a',
                            'border-hi': '#2e2e2e',
                            text:        '#ededed',
                            'text-2':    '#888888',
                            'text-3':    '#444444',
                            accent:      '#ffffff',
                            success:     '#3dd68c',
                            error:       '#ff4444',
                        }
                    },
                    fontFamily: {
                        mono: ['"Geist Mono"', 'ui-monospace', '"Cascadia Code"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #ffffff;
            color: #000000;
            padding: 8px 12px;
            border-radius: 4px;
            z-index: 100;
            font-size: 13px;
        }
        .skip-link:focus { top: 10px; }
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-vrc-bg min-h-screen text-vrc-text">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main id="main-content" tabindex="-1" class="max-w-xl mx-auto px-4 py-16">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
